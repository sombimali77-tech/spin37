<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background-image: url('background.jpg');
            background-color: #1a1a1a;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden; 
        }

        #scoreboard { display: flex; gap: 40px; margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.7); border: 4px solid #00d4ff; border-radius: 20px; box-shadow: 0 0 20px #00d4ff; }
        .player-score { display: flex; align-items: center; gap: 15px; font-size: 28px; }
        .player-score img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; }
        .ron-color { color: #ff8c00; text-shadow: 2px 2px 4px #000; }
        .mes-color { color: #ff00ff; text-shadow: 2px 2px 4px #000; }
        
        #wheel-area { position: relative; display: flex; align-items: center; margin: 20px 0; }
        #wheel { 
            width: 400px; height: 400px; border-radius: 50%; 
            border: 12px solid transparent;
            background-clip: padding-box, border-box;
            background-origin: border-box;
            background-image: linear-gradient(black, black), linear-gradient(45deg, #ff00ff, #00d4ff, #ffd700, #ff0000);
            overflow: hidden; 
            display: flex; flex-direction: column; cursor: pointer;
            box-shadow: 0 0 40px #ff00ff;
        }
        .side { width: 100%; height: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; gap: 10px; }
        #ron-side { background: linear-gradient(135deg, #d35400, #a04000); }
        #mes-side { background: linear-gradient(135deg, #ff00ff, #800080); }
        .side img { width: 50%; height: 50%; object-fit: contain; }
        .side span { font-size: 25px; color: white; text-transform: uppercase; font-weight: bold; text-shadow: 3px 3px 6px #000; }

        .arrow-container { position: relative; left: -10px; z-index: 5; }
        .stylish-arrow { width: 0; height: 0; border-top: 30px solid transparent; border-bottom: 30px solid transparent; border-right: 60px solid #ffd700; filter: drop-shadow(0 0 10px #ffd700); }

        #winner-popup { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: radial-gradient(circle, #333, #000); padding: 40px; 
            border: 8px solid #ffd700; text-align: center; border-radius: 20px; 
            width: 300px; z-index: 10; box-shadow: 0 0 50px rgba(255, 215, 0, 0.6);
            animation: popIn 0.5s ease-out;
        }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0); } to { transform: translate(-50%, -50%) scale(1); } }
        #winner-img { width: 150px; height: 150px; border-radius: 15px; border: 5px solid #fff; margin-bottom: 15px; }

        .controls { margin-top: 10px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .main-btns { display: flex; gap: 20px; }
        
        .btn-action { 
            padding: 15px 35px; font-size: 20px; cursor: pointer; color: #fff;
            background: #222;
            border: 3px solid #ffd700;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 0 15px #ffd700;
            text-shadow: 1px 1px 2px #000;
            transition: all 0.3s ease;
        }
        .btn-action:hover { 
            transform: translateY(-3px); 
            background: #444;
            box-shadow: 0 0 25px #ffd700, 0 0 10px #fff;
        }
        
        /* Updated Visible Controls */
        .controls-label { margin-top: 20px; font-size: 16px; font-weight: bold; }
        .hidden-controls { display: flex; gap: 8px; margin-top: 5px; opacity: 1; }
        .hidden-controls button {
            padding: 10px 15px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .hidden-controls button:hover { background: #fff; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="player-score"><img src="ronaldo.jpg"> <span class="ron-color">Ronaldo: <span id="score-Ronaldo">0</span></span></div>
        <div class="player-score"><img src="messi.jpg"> <span class="mes-color">Messi: <span id="score-Messi">0</span></span></div>
    </div>

    <div id="wheel-area">
        <div id="wheel" onclick="toggleSpin()">
            <div class="side" id="ron-side"><img src="ronaldo.jpg"><span>RONALDO</span></div>
            <div class="side" id="mes-side"><img src="messi.jpg"><span>MESSI</span></div>
        </div>
        <div class="arrow-container"><div class="stylish-arrow"></div></div>
        
        <div id="winner-popup">
            <h1 id="winner-text" style="color: #ffd700; margin-top: 0;"></h1>
            <img id="winner-img">
        </div>
    </div>

    <div class="controls">
        <div class="main-btns">
            <button class="btn-action" onclick="toggleMusic()">MUSIC: ON/OFF</button>
            <button class="btn-action" onclick="toggleSpin()">SPIN: START/STOP</button>
        </div>
        
        <div class="controls-label">SOUND EFFECTS:</div>
        <div class="hidden-controls">
            <button onclick="playCustom(1)">1</button>
            <button onclick="playCustom(2)">2</button>
            <button onclick="playCustom(3)">3</button>
            <button onclick="playCustom(4)">4</button>
            <button onclick="playCustom(5)">5</button>
            <button onclick="playCustom(6)">6</button>
            <button onclick="playCustom(7)">7</button>
            <button onclick="playCustom(8)">8</button>
            <button onclick="playCustom(9)">9</button>
            <button onclick="playCustom(10)">10</button>
        </div>
    </div>

    <audio id="spin-sound" src="spin.mp3"></audio>
    <audio id="win-sound" src="win.mp3"></audio>

    <script>
        for(let i=1; i<=10; i++) {
            let a = document.createElement('audio');
            a.id = 'c' + i;
            a.src = 'custom' + i + '.mp3';
            document.body.appendChild(a);
        }

        let scores = { Ronaldo: 0, Messi: 0 };
        let activeCustom = null;
        let isSpinning = false;
        let musicMuted = false;
        const spinSound = document.getElementById('spin-sound');
        const winSound = document.getElementById('win-sound');
        const wheel = document.getElementById('wheel');

        function toggleMusic() {
            musicMuted = !musicMuted;
            spinSound.muted = musicMuted;
            winSound.muted = musicMuted;
        }

        function toggleSpin() {
            isSpinning = !isSpinning;
            if (isSpinning) runSpinSequence();
            else wheel.style.transition = 'none';
        }

        function applyVolumeDucking() {
            if (activeCustom && !activeCustom.paused) {
                spinSound.volume = 0.2;
                winSound.volume = 0.2;
            } else {
                spinSound.volume = 1.0;
                winSound.volume = 1.0;
            }
        }

        function runSpinSequence() {
            if (!isSpinning) return;
            applyVolumeDucking();
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            
            setTimeout(() => {
                if (!isSpinning) return;
                spinSound.currentTime = 0;
                spinSound.play();
                wheel.style.transition = 'transform 30s cubic-bezier(0.15, 0, 0, 1)';
                const randomDegree = Math.floor(Math.random() * 360);
                wheel.style.transform = `rotate(${randomDegree + 3600}deg)`;
                
                setTimeout(() => {
                    if (isSpinning) showWinner(randomDegree);
                }, 30000);
            }, 50);
        }

        function showWinner(randomDegree) {
            winSound.currentTime = 0;
            winSound.play();
            const winner = (randomDegree >= 0 && randomDegree <= 180) ? 'Ronaldo' : 'Messi';
            document.getElementById('winner-text').innerText = winner + " WINS!";
            document.getElementById('winner-img').src = winner.toLowerCase() + ".jpg"; 
            document.getElementById('winner-popup').style.display = 'block';
            scores[winner]++;
            document.getElementById('score-' + winner).innerText = scores[winner];
            
            setTimeout(() => { 
                document.getElementById('winner-popup').style.display = 'none'; 
                if (isSpinning) setTimeout(runSpinSequence, 1000);
            }, 5000);
        }

        function playCustom(num) {
            const selectedAudio = document.getElementById('c' + num);
            if (activeCustom && activeCustom !== selectedAudio) { activeCustom.pause(); activeCustom.currentTime = 0; }
            if (selectedAudio.paused) { selectedAudio.play(); activeCustom = selectedAudio; } 
            else { selectedAudio.pause(); }
            applyVolumeDucking();
        }
    </script>
</body>
</html>
